<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>치후 테라리움 — 클래스 이상형 월드컵</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.2/html2pdf.bundle.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Noto+Serif+KR:wght@400;600;700&family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --parchment: #f4efe4;
  --parchment-dark: #e8e0d0;
  --ink: #2c2416;
  --ink-light: #5a4d3a;
  --botanical: #4a6741;
  --botanical-light: #6b8f5e;
  --botanical-dark: #2d3f28;
  --moss: #7a8c5e;
  --fern: #8ba37a;
  --earth: #8b7355;
  --earth-light: #b09a7a;
  --gold: #c4a35a;
  --gold-light: #dfc88a;
  --rose: #b87878;
  --rose-light: #d4a5a5;
  --cream: #faf7f0;
  --shadow: rgba(44, 36, 22, 0.12);
}

html { font-size: 16px; }

body {
  font-family: 'Gowun Batang', 'Noto Serif KR', serif;
  background: var(--parchment);
  color: var(--ink);
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ══════════ Botanical background texture ══════════ */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(74,103,65,0.04) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 30%, rgba(139,115,85,0.05) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 80%, rgba(196,163,90,0.03) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

/* Grain overlay */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  opacity: 0.3;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.4'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}

/* ══════════ Layout containers ══════════ */
.app {
  position: relative;
  z-index: 1;
  max-width: 520px;
  margin: 0 auto;
  min-height: 100dvh;
  padding: 0 1.25rem;
}

/* ══════════ Botanical decorative elements ══════════ */
.leaf-border {
  display: block;
  width: 100%;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--botanical) 20%, var(--botanical) 80%, transparent);
  opacity: 0.3;
  margin: 1rem 0;
}

.ornament {
  text-align: center;
  color: var(--botanical);
  opacity: 0.5;
  font-size: 1.2rem;
  letter-spacing: 0.8em;
  margin: 0.75rem 0;
  font-family: 'Cormorant Garamond', serif;
}

/* ══════════ Start Screen ══════════ */
.screen { display: none; }
.screen.active { display: flex; flex-direction: column; }

#startScreen {
  align-items: center;
  justify-content: center;
  min-height: 100dvh;
  text-align: center;
  padding: 2rem 1rem;
}

.logo-area {
  margin-bottom: 2rem;
}

.logo-botanical {
  width: 80px;
  height: 80px;
  margin: 0 auto 1.5rem;
  position: relative;
}

.logo-botanical::before {
  content: '';
  position: absolute;
  inset: 0;
  border: 1.5px solid var(--botanical);
  border-radius: 50%;
  opacity: 0.4;
}

.logo-botanical::after {
  content: '🌿';
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2.2rem;
}

.title-main {
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.85rem;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: var(--ink-light);
  margin-bottom: 0.5rem;
}

.title-kr {
  font-family: 'Noto Serif KR', serif;
  font-size: 2rem;
  font-weight: 700;
  color: var(--ink);
  line-height: 1.3;
  margin-bottom: 0.25rem;
}

.title-sub {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1rem;
  font-style: italic;
  color: var(--earth);
  letter-spacing: 0.1em;
}

.start-desc {
  margin: 2rem 0;
  padding: 1.5rem 1.25rem;
  background: linear-gradient(135deg, rgba(255,255,255,0.5), rgba(255,255,255,0.2));
  border: 1px solid rgba(74,103,65,0.15);
  border-radius: 2px;
}

.start-desc p {
  font-size: 0.9rem;
  line-height: 1.8;
  color: var(--ink-light);
}

.start-desc strong {
  color: var(--botanical-dark);
  font-weight: 600;
}

.round-selector {
  margin: 1.5rem 0 2rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.75rem;
}

.round-selector label {
  font-size: 0.8rem;
  letter-spacing: 0.15em;
  color: var(--ink-light);
}

.round-buttons {
  display: flex;
  gap: 0.5rem;
}

.round-btn {
  padding: 0.5rem 1.2rem;
  border: 1px solid var(--earth-light);
  background: transparent;
  color: var(--ink-light);
  font-family: 'Gowun Batang', serif;
  font-size: 0.85rem;
  cursor: pointer;
  transition: all 0.3s ease;
  border-radius: 1px;
}

.round-btn:hover {
  border-color: var(--botanical);
  color: var(--botanical);
}

.round-btn.selected {
  background: var(--botanical-dark);
  border-color: var(--botanical-dark);
  color: var(--cream);
}

.btn-start {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  padding: 1rem 3rem;
  background: var(--botanical-dark);
  color: var(--cream);
  border: none;
  font-family: 'Noto Serif KR', serif;
  font-size: 1rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  cursor: pointer;
  transition: all 0.4s ease;
  position: relative;
  overflow: hidden;
}

.btn-start::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, transparent, rgba(255,255,255,0.1), transparent);
  transform: translateX(-100%);
  transition: transform 0.6s ease;
}

.btn-start:hover::before {
  transform: translateX(100%);
}

.btn-start:hover {
  background: var(--botanical);
  transform: translateY(-1px);
  box-shadow: 0 4px 20px rgba(45,63,40,0.3);
}

/* ══════════ Game Screen ══════════ */
#gameScreen {
  min-height: 100dvh;
  padding-top: 1.5rem;
  padding-bottom: 2rem;
}

.game-header {
  text-align: center;
  margin-bottom: 1.5rem;
}

.round-badge {
  display: inline-block;
  padding: 0.35rem 1.5rem;
  border: 1px solid var(--botanical);
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.8rem;
  letter-spacing: 0.3em;
  color: var(--botanical);
  margin-bottom: 0.75rem;
}

.match-progress {
  font-size: 0.8rem;
  color: var(--ink-light);
  margin-bottom: 1rem;
}

.progress-bar {
  width: 100%;
  height: 3px;
  background: var(--parchment-dark);
  border-radius: 1px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--botanical-dark), var(--botanical-light));
  transition: width 0.5s ease;
  border-radius: 1px;
}

/* ══════════ VS Battle Area ══════════ */
.battle-area {
  display: flex;
  flex-direction: column;
  gap: 1rem;
  margin: 1rem 0;
}

.vs-divider {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 1rem;
  padding: 0.25rem 0;
}

.vs-line {
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--earth-light), transparent);
}

.vs-text {
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.85rem;
  font-style: italic;
  color: var(--earth);
  letter-spacing: 0.2em;
}

/* ══════════ Class Card ══════════ */
.class-card {
  position: relative;
  background: linear-gradient(160deg, var(--cream) 0%, var(--parchment) 100%);
  border: 1px solid rgba(74,103,65,0.18);
  padding: 1.75rem 1.5rem;
  cursor: pointer;
  transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
  overflow: hidden;
}

.class-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--botanical), var(--gold), var(--botanical));
  opacity: 0;
  transition: opacity 0.3s ease;
}

.class-card::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 50% 0%, rgba(74,103,65,0.06), transparent 70%);
  opacity: 0;
  transition: opacity 0.3s ease;
}

.class-card:hover {
  transform: translateY(-2px);
  border-color: var(--botanical);
  box-shadow: 0 8px 32px var(--shadow), 0 2px 8px rgba(74,103,65,0.08);
}

.class-card:hover::before,
.class-card:hover::after {
  opacity: 1;
}

.class-card:active {
  transform: scale(0.98);
}

.card-content {
  position: relative;
  z-index: 1;
}

.card-category {
  font-size: 0.7rem;
  letter-spacing: 0.2em;
  color: var(--botanical);
  margin-bottom: 0.5rem;
  display: flex;
  align-items: center;
  gap: 0.4rem;
}

.card-category::before {
  content: '';
  display: inline-block;
  width: 12px;
  height: 1px;
  background: var(--botanical);
  opacity: 0.5;
}

.card-name {
  font-family: 'Noto Serif KR', serif;
  font-size: 1.35rem;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 0.6rem;
  line-height: 1.3;
}

.card-desc {
  font-size: 0.82rem;
  line-height: 1.7;
  color: var(--ink-light);
  margin-bottom: 1rem;
}

.card-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 0.4rem;
}

.tag {
  padding: 0.2rem 0.65rem;
  font-size: 0.68rem;
  border: 1px solid;
  letter-spacing: 0.05em;
  border-radius: 1px;
}

.tag-diff { border-color: var(--botanical); color: var(--botanical); }
.tag-price { border-color: var(--gold); color: var(--earth); }
.tag-feature { border-color: var(--rose-light); color: var(--rose); }
.tag-score { border-color: var(--earth-light); color: var(--earth); background: rgba(139,115,85,0.06); }

.card-emoji {
  position: absolute;
  top: 1.25rem;
  right: 1.25rem;
  font-size: 2rem;
  opacity: 0.7;
  z-index: 1;
  transition: transform 0.3s ease;
}

.class-card:hover .card-emoji {
  transform: scale(1.15) rotate(-5deg);
}

/* Card selection animation */
.class-card.chosen {
  border-color: var(--botanical);
  background: linear-gradient(160deg, rgba(74,103,65,0.08), rgba(74,103,65,0.03));
  animation: cardChosen 0.4s ease forwards;
}

.class-card.not-chosen {
  opacity: 0.3;
  transform: scale(0.97);
  filter: grayscale(0.5);
  pointer-events: none;
}

@keyframes cardChosen {
  0% { transform: scale(1); }
  30% { transform: scale(1.02); }
  100% { transform: scale(1); }
}

/* ══════════ Result Screen ══════════ */
#resultScreen {
  align-items: center;
  justify-content: center;
  min-height: 100dvh;
  text-align: center;
  padding: 2rem 1rem;
}

.result-crown {
  font-size: 2.5rem;
  margin-bottom: 0.5rem;
  animation: crownFloat 3s ease-in-out infinite;
}

@keyframes crownFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}

.result-label {
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.8rem;
  letter-spacing: 0.4em;
  color: var(--gold);
  margin-bottom: 0.5rem;
}

.result-name {
  font-family: 'Noto Serif KR', serif;
  font-size: 2rem;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 0.25rem;
  line-height: 1.3;
}

.result-category {
  font-size: 0.85rem;
  color: var(--botanical);
  margin-bottom: 2rem;
}

.result-card {
  width: 100%;
  background: linear-gradient(160deg, var(--cream), rgba(255,255,255,0.6));
  border: 1px solid rgba(74,103,65,0.2);
  padding: 2rem 1.5rem;
  text-align: left;
  margin-bottom: 2rem;
}

.result-card .card-desc {
  font-size: 0.88rem;
  margin-bottom: 1.25rem;
}

.result-stats {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 1rem;
  padding-top: 1.25rem;
  border-top: 1px solid rgba(74,103,65,0.12);
}

.stat-item {
  text-align: center;
}

.stat-label {
  font-size: 0.65rem;
  letter-spacing: 0.15em;
  color: var(--ink-light);
  margin-bottom: 0.25rem;
}

.stat-value {
  font-family: 'Noto Serif KR', serif;
  font-size: 1rem;
  font-weight: 700;
  color: var(--botanical-dark);
}

/* Ranking list */
.ranking-section {
  width: 100%;
  margin-top: 0.5rem;
  margin-bottom: 2rem;
}

.ranking-title {
  font-size: 0.75rem;
  letter-spacing: 0.2em;
  color: var(--ink-light);
  margin-bottom: 1rem;
}

.ranking-list {
  list-style: none;
  width: 100%;
}

.ranking-item {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 0.7rem 1rem;
  border-bottom: 1px solid rgba(74,103,65,0.08);
  animation: rankSlide 0.5s ease both;
}

.ranking-item:nth-child(1) { animation-delay: 0.1s; }
.ranking-item:nth-child(2) { animation-delay: 0.2s; }
.ranking-item:nth-child(3) { animation-delay: 0.3s; }
.ranking-item:nth-child(4) { animation-delay: 0.4s; }

@keyframes rankSlide {
  from { opacity: 0; transform: translateX(-10px); }
  to { opacity: 1; transform: translateX(0); }
}

.rank-number {
  width: 1.5rem;
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--gold);
}

.rank-emoji {
  font-size: 1.1rem;
}

.rank-name {
  flex: 1;
  font-size: 0.88rem;
  color: var(--ink);
}

.rank-cat {
  font-size: 0.7rem;
  color: var(--ink-light);
}

.btn-show-all {
  display: block;
  margin: 1rem auto 0;
  padding: 0.5rem 1.5rem;
  background: transparent;
  border: 1px dashed var(--earth-light);
  color: var(--ink-light);
  font-family: 'Gowun Batang', serif;
  font-size: 0.78rem;
  cursor: pointer;
  transition: all 0.3s ease;
  letter-spacing: 0.05em;
}

.btn-show-all:hover {
  border-color: var(--botanical);
  color: var(--botanical-dark);
}

.ranking-full {
  list-style: none;
  width: 100%;
  display: none;
  margin-top: 0.5rem;
  max-height: 40vh;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--earth-light) transparent;
}

.ranking-full::-webkit-scrollbar { width: 4px; }
.ranking-full::-webkit-scrollbar-thumb { background: var(--earth-light); border-radius: 2px; }

.ranking-full .ranking-item {
  padding: 0.5rem 1rem;
  font-size: 0.82rem;
}

.ranking-full .rank-number {
  color: var(--ink-light);
  font-size: 0.85rem;
  font-weight: 400;
}

.result-buttons {
  display: flex;
  gap: 0.75rem;
  margin-top: 0.5rem;
}

.btn-download {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.85rem 2rem;
  background: var(--botanical-dark);
  border: 1px solid var(--botanical-dark);
  color: var(--cream);
  font-family: 'Gowun Batang', serif;
  font-size: 0.9rem;
  cursor: pointer;
  transition: all 0.3s ease;
}

.btn-download:hover {
  background: var(--botanical);
  border-color: var(--botanical);
}

.btn-restart {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.85rem 2rem;
  background: transparent;
  border: 1px solid var(--botanical);
  color: var(--botanical-dark);
  font-family: 'Gowun Batang', serif;
  font-size: 0.9rem;
  cursor: pointer;
  transition: all 0.3s ease;
}

.btn-restart:hover {
  background: var(--botanical-dark);
  color: var(--cream);
}

/* ══════════ Transitions ══════════ */
.fade-in {
  animation: fadeIn 0.6s ease both;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

.card-enter-left {
  animation: enterLeft 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
}

.card-enter-right {
  animation: enterRight 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
}

@keyframes enterLeft {
  from { opacity: 0; transform: translateX(-30px); }
  to { opacity: 1; transform: translateX(0); }
}

@keyframes enterRight {
  from { opacity: 0; transform: translateX(30px); }
  to { opacity: 1; transform: translateX(0); }
}

/* ══════════ Responsive ══════════ */
@media (max-width: 380px) {
  .card-name { font-size: 1.15rem; }
  .class-card { padding: 1.5rem 1.25rem; }
  .result-name { font-size: 1.6rem; }
  .title-kr { font-size: 1.7rem; }
}

/* ══════════ Scrollbar ══════════ */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--parchment); }
::-webkit-scrollbar-thumb { background: var(--earth-light); border-radius: 2px; }
</style>
</head>
<body>
<div class="app">

  <!-- ═══════ START SCREEN ═══════ -->
  <div id="startScreen" class="screen active">
    <div class="logo-area fade-in">
      <div class="logo-botanical"></div>
      <div class="title-main">Chihoo Terrarium</div>
      <div class="title-kr">클래스 이상형 월드컵</div>
      <div class="title-sub">Which class speaks to your heart?</div>
    </div>

    <div class="ornament">— ✦ —</div>

    <div class="start-desc fade-in" style="animation-delay: 0.15s;">
      <p>
        치후 테라리움의 <strong>120개 클래스</strong> 중<br>
        가장 해보고 싶은 클래스를 골라주세요.<br>
        토너먼트 방식으로 진행됩니다.
      </p>
    </div>

    <div class="round-selector fade-in" style="animation-delay: 0.25s;">
      <label>라운드 선택</label>
      <div class="round-buttons">
        <button class="round-btn" data-round="16" onclick="selectRound(16)">16강</button>
        <button class="round-btn" data-round="32" onclick="selectRound(32)">32강</button>
        <button class="round-btn" data-round="64" onclick="selectRound(64)">64강</button>
        <button class="round-btn selected" data-round="120" onclick="selectRound(120)">120강</button>
      </div>
    </div>

    <button class="btn-start fade-in" style="animation-delay: 0.35s;" onclick="startGame()">
      시작하기
    </button>
  </div>

  <!-- ═══════ GAME SCREEN ═══════ -->
  <div id="gameScreen" class="screen">
    <div class="game-header">
      <div class="round-badge" id="roundBadge">16강</div>
      <div class="match-progress" id="matchProgress">1 / 8</div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
      </div>
    </div>

    <div class="battle-area" id="battleArea"></div>
  </div>

  <!-- ═══════ RESULT SCREEN ═══════ -->
  <div id="resultScreen" class="screen">
    <div class="result-crown fade-in">🌿</div>
    <div class="result-label fade-in" style="animation-delay:0.1s">YOUR CHOICE</div>
    <div class="result-name fade-in" style="animation-delay:0.2s" id="resultName"></div>
    <div class="result-category fade-in" style="animation-delay:0.25s" id="resultCategory"></div>

    <div class="ornament fade-in" style="animation-delay:0.3s">— ✦ —</div>

    <div class="result-card fade-in" style="animation-delay:0.35s" id="resultCard"></div>

    <div class="ranking-section fade-in" style="animation-delay:0.5s">
      <div class="ranking-title">최종 순위</div>

let selectedRound = 120;
let effectiveRound = 0;
let currentRound = [];
let nextRound = [];
let matchIndex = 0;
let totalMatchesInRound = 0;
let roundName = '';
let rankings = [];

function selectRound(n) {
  selectedRound = n;
  document.querySelectorAll('.round-btn').forEach(b => {
    b.classList.toggle('selected', parseInt(b.dataset.round) === n);
  });
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getRoundName(count) {
  if (count === 2) return '결승';
  if (count === 4) return '준결승';
  if (count === 8) return '8강';
  if (count === 16) return '16강';
  if (count === 32) return '32강';
  if (count === 64) return '64강';
  if (count === 120) return '120강';
  return `${count}강`;
}

function startGame() {
  let pool = shuffle([...ALL_CLASSES]).slice(0, selectedRound);

  // Handle non-power-of-2: give byes so bracket works
  const nextPow2 = Math.pow(2, Math.ceil(Math.log2(pool.length)));
  const byeCount = nextPow2 - pool.length;

  nextRound = pool.slice(0, byeCount);   // bye: auto-advance
  currentRound = pool.slice(byeCount);    // these play first round
  effectiveRound = selectedRound;

  matchIndex = 0;
  rankings = [];
  totalMatchesInRound = currentRound.length / 2;
  roundName = getRoundName(effectiveRound);

  showScreen('gameScreen');
  showMatch();
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function showMatch() {
  const a = currentRound[matchIndex * 2];
  const b = currentRound[matchIndex * 2 + 1];
  roundName = getRoundName(effectiveRound);

  document.getElementById('roundBadge').textContent = roundName;
  document.getElementById('matchProgress').textContent = `${matchIndex + 1} / ${totalMatchesInRound}`;
  const pct = (matchIndex / totalMatchesInRound) * 100;
  document.getElementById('progressFill').style.width = pct + '%';

  const area = document.getElementById('battleArea');
  area.innerHTML = `
    ${renderCard(a, 'left')}
    <div class="vs-divider fade-in">
      <span class="vs-line"></span>
      <span class="vs-text">or</span>
      <span class="vs-line"></span>
    </div>
    ${renderCard(b, 'right')}
  `;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderCard(cls, side) {
  return `
    <div class="class-card card-enter-${side}" onclick="pick(${cls.id})" data-id="${cls.id}">
      <span class="card-emoji">${cls.emoji}</span>
      <div class="card-content">
        <div class="card-category">${cls.cat}</div>
        <div class="card-name">${cls.name}</div>
        <div class="card-desc">${cls.desc}</div>
        <div class="card-tags">
          <span class="tag tag-diff">${cls.diff}</span>
          <span class="tag tag-price">${cls.price}</span>
          <span class="tag tag-feature">${cls.feat}</span>
          <span class="tag tag-score">${cls.score}점</span>
        </div>
      </div>
    </div>
  `;
}

function pick(winnerId) {
  const a = currentRound[matchIndex * 2];
  const b = currentRound[matchIndex * 2 + 1];
  const winner = a.id === winnerId ? a : b;
  const loser = a.id === winnerId ? b : a;

  // Animate
  const cards = document.querySelectorAll('.class-card');
  cards.forEach(c => {
    if (parseInt(c.dataset.id) === winnerId) {
      c.classList.add('chosen');
    } else {
      c.classList.add('not-chosen');
    }
  });

  // Track losers for ranking
  rankings.push({ ...loser, eliminatedAt: getRoundName(effectiveRound) });

  nextRound.push(winner);
  matchIndex++;

  setTimeout(() => {
    if (matchIndex >= totalMatchesInRound) {
      // Round complete
      if (nextRound.length === 1) {
        // Game over!
        showResult(nextRound[0]);
        return;
      }
      currentRound = nextRound;
      nextRound = [];
      matchIndex = 0;
      effectiveRound = currentRound.length;
      totalMatchesInRound = currentRound.length / 2;
    }
    showMatch();
  }, 600);
}

function showResult(winner) {
  rankings.push({ ...winner, eliminatedAt: '우승' });
  rankings.reverse();

  document.getElementById('resultName').textContent = winner.name;
  document.getElementById('resultCategory').textContent = winner.cat;

  document.getElementById('resultCard').innerHTML = `
    <div style="font-size:2.5rem; text-align:center; margin-bottom:1rem;">${winner.emoji}</div>
    <div class="card-desc">${winner.desc}</div>
    <div class="result-stats">
      <div class="stat-item">
        <div class="stat-label">난이도</div>
        <div class="stat-value">${winner.diff}</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">가격</div>
        <div class="stat-value">${winner.price}</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">평가점수</div>
        <div class="stat-value">${winner.score}점</div>
      </div>
    </div>
  `;

  const list = document.getElementById('rankingList');
  const topN = rankings.slice(0, Math.min(4, rankings.length));
  const medals = ['🥇', '🥈', '🥉', '4'];
  list.innerHTML = topN.map((r, i) => `
    <li class="ranking-item">
      <span class="rank-number">${i < 3 ? medals[i] : (i + 1)}</span>
      <span class="rank-emoji">${r.emoji}</span>
      <span class="rank-name">${r.name}</span>
      <span class="rank-cat">${r.cat}</span>
    </li>
  `).join('');

  showScreen('resultScreen');
}

function toggleFullRanking() {
  const full = document.getElementById('rankingFull');
  const btn = document.getElementById('btnShowAll');
  if (full.style.display === 'block') {
    full.style.display = 'none';
    btn.textContent = '전체 순위 보기';
  } else {
    full.style.display = 'block';
    btn.textContent = '접기';
    // Render full ranking (skip top 4 already shown)
    const rest = rankings.slice(4);
    full.innerHTML = rest.map((r, i) => `
      <li class="ranking-item">
        <span class="rank-number">${i + 5}</span>
        <span class="rank-emoji">${r.emoji}</span>
        <span class="rank-name">${r.name}</span>
        <span class="rank-cat">${r.cat}</span>
      </li>
    `).join('');
  }
}

      <td style="text-align:center;padding:6px 8px;font-size:11px;color:#5a4d3a;">${round}</td>

  }).join('');

  const winner = rankings[0];
  const html = `
    <div style="font-family:'Noto Serif KR','Gowun Batang',serif;color:#2c2416;padding:20px;">
      <div style="text-align:center;margin-bottom:6px;">

      </div>
      <div style="text-align:center;margin:16px 0;padding:14px;background:#f4efe4;border-radius:6px;">
        <div style="font-size:28px;margin-bottom:4px;">${winner.emoji}</div>

        <div style="font-size:11px;color:#5a4d3a;">${winner.cat} · ${winner.price} · ${winner.score}점</div>
      </div>
      <table style="width:100%;border-collapse:collapse;font-size:12px;margin-top:10px;">
        <thead>
          <tr style="background:#4a6741;color:#faf7f0;">
            <th style="padding:7px 8px;text-align:center;width:36px;">순위</th>
            <th style="padding:7px 4px;width:28px;"></th>
            <th style="padding:7px 8px;text-align:left;">클래스명</th>
            <th style="padding:7px 8px;text-align:left;">카테고리</th>
            <th style="padding:7px 8px;text-align:center;width:36px;">점수</th>
            <th style="padding:7px 8px;text-align:center;">가격</th>
            <th style="padding:7px 8px;text-align:center;">라운드</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
      <div style="text-align:center;margin-top:14px;font-size:9px;color:#b09a7a;letter-spacing:0.1em;">
        치후 테라리움 · chihoo.com
      </div>
    </div>
  `;

  const container = document.createElement('div');
  container.innerHTML = html;
  document.body.appendChild(container);

  html2pdf().set({
    margin: [8, 6, 8, 6],
    filename: `치후_클래스_월드컵_순위_${dateStr}.pdf`,
    image: { type: 'jpeg', quality: 0.95 },
    html2canvas: { scale: 2, useCORS: true },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
  }).from(container.firstElementChild).save().then(() => {
    document.body.removeChild(container);
  });
}

function restart() {
  showScreen('startScreen');
}
